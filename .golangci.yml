version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - misspell
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]

formatters:
  enable:
    - gofmt
    - goimports
