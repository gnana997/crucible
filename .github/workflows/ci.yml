name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt -s -l reported diffs:"
            echo "$out"
            exit 1
          fi

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o /tmp/crucible ./cmd/crucible

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2   # v2 config (.golangci.yml `version: "2"`) needs action v7+; pinned to match local
          args: --timeout=5m

  # The client (CLI + `mcp serve`) must keep cross-compiling: the daemon is
  # Linux-only and stubs out elsewhere (cmd/crucible/daemon_stub.go). This
  # catches a stray Linux-only import sneaking into a client path. Cheap
  # cross-compile on ubuntu — no per-OS runner needed.
  cross-build:
    name: cross-build client (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [darwin/arm64, darwin/amd64, windows/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Cross-build ${{ matrix.target }}
        run: |
          t="${{ matrix.target }}"
          GOOS="${t%/*}" GOARCH="${t#*/}" go build -o /dev/null ./cmd/crucible

  # Native macOS run: prove the client actually works on a Mac, the daemon
  # stub fires with a helpful message, and the pure-Go client/MCP packages
  # (the code a Mac user exercises) pass their tests on darwin.
  client-macos:
    name: client (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build client + verify daemon stub
        run: |
          go build -o /tmp/crucible ./cmd/crucible
          /tmp/crucible version
          out="$(/tmp/crucible daemon 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q "Linux only" || { echo "::error::daemon stub message missing"; exit 1; }
      - name: Pure-Go client/MCP tests on darwin
        # The packages a Mac user actually exercises — all HTTP/pure-Go. We omit
        # internal/agentapi: it's the daemon<->guest socket client (Linux-only in
        # practice) and its unix-socket test trips macOS's 104-char sun_path limit
        # on the runner's long $TMPDIR — irrelevant to the client.
        run: |
          go test -count=1 \
            ./sdk/... ./internal/mcpserver/... \
            ./internal/netallow/... ./internal/policy/... ./internal/agentwire/... \
            ./internal/tokenstore/... ./internal/version/...

  # Generated artifacts must match their generators: docs/openapi.json is
  # reflected from the Go wire types, and the TS/Python types under sdks/ are
  # generated from that spec — the single fan-out point that keeps N languages
  # in lock-step with the Go contract. A diff here means a wire-type change
  # was committed without `make gen`. Mirrors the route-coverage test in
  # cmd/openapi-gen.
  codegen-drift:
    name: generated code drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Install uv (runs the pinned datamodel-code-generator)
        run: pip install uv
      - name: Regenerate spec + TS + Python types
        run: make gen
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- docs/openapi.json sdks/; then
            echo "::error::generated artifacts drifted — run 'make gen' and commit the result"
            exit 1
          fi

  # The TS SDK scaffold: typecheck + the frame-codec conformance tests
  # (decodes every fixture in sdks/fixtures per docs/wire.md).
  sdk-ts:
    name: TS SDK (typecheck + fixtures)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
